services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    env_file:
      - ./server/.env
    environment:
      FLASK_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:${FRONTEND_HOST_PORT:-3000}
      DATABASE_URL: sqlite:////app/data/ecommerce.db
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-5000}
    container_name: ecommerce-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-5000}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
